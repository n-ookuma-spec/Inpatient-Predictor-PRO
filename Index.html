<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入院予兆分析 PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .animate-in.fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-in.slide-in-from-right-4 { animation: slideInRight 0.3s ease-out forwards; }

        .user-sidebar-item.active {
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen overflow-hidden">

    <div id="root" class="h-screen bg-slate-50 flex flex-col text-slate-800 font-sans relative"></div>

    <script>
        const DB_NAME = 'MedicalAnalysisProDB';
        const DB_VERSION = 1;
        const STORE_HISTORY = 'history';
        const STORE_STATUS = 'userStatus';

        const dbOpener = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_HISTORY)) db.createObjectStore(STORE_HISTORY, { keyPath: 'id' });
                    if (!db.objectStoreNames.contains(STORE_STATUS)) db.createObjectStore(STORE_STATUS, { keyPath: 'uid' });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const dbAction = async (storeName, mode, callback) => {
            try {
                const db = await dbOpener();
                const tx = db.transaction(storeName, mode);
                const store = tx.objectStore(storeName);
                const result = await callback(store);
                return new Promise((resolve, reject) => {
                    tx.oncomplete = () => {
                        db.close(); 
                        resolve(result);
                    };
                    tx.onerror = (e) => {
                        db.close();
                        reject(e.target.error);
                    };
                });
            } catch (err) {
                console.error("DBアクセスエラーだぜ: ", err);
                return null;
            }
        };

        const DB = {
            getAllHistory: () => dbAction(STORE_HISTORY, 'readonly', s => new Promise(r => {
                const req = s.getAll();
                req.onsuccess = () => r((req.result || []).sort((a, b) => b.id.localeCompare(a.id)));
            })),
            saveHistory: (historyObj) => dbAction(STORE_HISTORY, 'readwrite', s => s.put(historyObj)),
            deleteHistory: (id) => dbAction(STORE_HISTORY, 'readwrite', s => s.delete(id)),
            clearAllHistory: () => dbAction(STORE_HISTORY, 'readwrite', s => s.clear()),
            getStatusMap: () => dbAction(STORE_STATUS, 'readonly', s => new Promise(r => {
                const req = s.getAll();
                req.onsuccess = () => {
                    const map = {};
                    (req.result || []).forEach(item => map[item.uid] = item);
                    r(map);
                };
            })),
            updateStatus: (statusObj) => dbAction(STORE_STATUS, 'readwrite', s => s.put(statusObj)),
            clearAllStatus: () => dbAction(STORE_STATUS, 'readwrite', s => s.clear())
        };

        const isValidVital = (item, val) => {
            if (val === null || val === undefined || val === '') return false;
            const num = parseFloat(val);
            if (isNaN(num)) return false;
            
            if (num === 9999) return false;

            const categoryItems = ['turgor', 'anorexia', 'medRecord', 'backPain', 'urinationPain', 'angina', 'oralEnv', 'fallHistory'];
            if (categoryItems.includes(item)) {
                return [10, 20, 30].includes(num); 
            } 

            if (num < 0) return false;
            if (item !== 'waterIntake' && num >= 1000) return false; 
            if (item === 'waterIntake' && num >= 10000) return false; 
            if (item === 'temp' && num >= 45) return false; 
            if (item === 'spo2' && num > 100) return false; 
            if (item === 'pulse' && num < 10) return false; 
            if (item === 'sleepTime' && num > 1440) return false; 

            return true;
        };
        
        const getValidVital = (item, val) => isValidVital(item, val) ? parseFloat(val) : null;

        let activeElementId = null;
        let activeSelectionStart = null;
        let activeSelectionEnd = null;

        function saveFocus() {
            const active = document.activeElement;
            if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) {
                activeElementId = active.id;
                activeSelectionStart = active.selectionStart;
                activeSelectionEnd = active.selectionEnd;
            } else {
                activeElementId = null;
            }
        }

        function restoreFocus() {
            if (activeElementId) {
                const el = document.getElementById(activeElementId);
                if (el) {
                    el.focus();
                    try { el.setSelectionRange(activeSelectionStart, activeSelectionEnd); } catch(e){}
                }
            }
        }

        let state = {
            loading: true,
            historyList: [],
            manualStatus: {},
            selectedUserId: null,
            view: 'dashboard', 
            selectedOffice: localStorage.getItem('last_selected_office') || 'すべて',
            statusFilter: 'all', 
            alertFilter: 'all', 
            searchQuery: '',
            graphPeriod: '1m',
            customStartDate: '', 
            customEndDate: '',   
            uploadStatus: { isUploading: false, message: '' },
            uploadSuccessMessage: '',
            confirmModal: null,
            selectedHistoryIds: [],
            alertModalUid: null,
            alertModalMode: 'alertOnly',
            expandedGroups: {},
            isSidebarOpen: true,
            csvExportModal: null
        };

        let processedData = {
            userList: [],
            userStatsMap: {},
            offices: ['すべて']
        };

        let chartInstances = {};

        const catLabels = {
            turgor: { 10: '遅延なし', 20: '3秒以上の遅延' },
            anorexia: { 10: '減少無し', 20: 'わずかに減少(8割未満)', 30: '明らかに減少(5割未満)' },
            medRecord: { 10: '服薬数5種類以下・服薬コンプライアンス問題なし', 20: '服薬数5種類以上または服薬コンプライアンス問題あり', 30: '服薬数5種類以上・服薬コンプライアンス問題あり' },
            backPain: { 10: 'なし', 20: '軽度の痛み(片側)', 30: '重度の痛み(片側)' },
            urinationPain: { 10: 'なし', 20: 'あり' },
            angina: { 10: 'なし', 20: '軽度の不定期な症状', 30: '頻繁、または重度の症状' },
            oralEnv: { 10: '問題なし', 20: '軽度(歯肉炎)疑い', 30: '重度(歯周病)疑い' },
            fallHistory: { 10: 'なし', 20: 'あり' }
        };

        const catLabelsTitle = {
            turgor: 'ツルゴール', anorexia: '食欲不振', medRecord: '服薬記録',
            backPain: '背部痛', urinationPain: '排尿時痛', angina: '狭心痛', oralEnv: '口腔環境',
            fallHistory: '転倒歴'
        };

        const displayOrder = [
            'bp', 'pulse', 'spo2', 'temp', 'respRate', 'weight', 'bmi', 'bloodSugar', 'sleepTime', 'waterIntake', 'walkTime5m',
            'medRecord', 'oralEnv', 'turgor', 'anorexia', 'backPain', 'urinationPain', 'angina', 'fallHistory'
        ];

        function setState(newState) {
            if (newState.selectedOffice) localStorage.setItem('last_selected_office', newState.selectedOffice);

            let needsProcess = false;
            const triggerKeys = ['manualStatus', 'selectedOffice', 'statusFilter', 'alertFilter', 'historyList', 'searchQuery'];
            if (Object.keys(newState).some(k => triggerKeys.includes(k))) {
                needsProcess = true;
            }
            
            saveFocus(); 
            
            const dashScroll = document.getElementById('dashboard-scroll-container');
            const dashScrollPos = dashScroll ? dashScroll.scrollTop : 0;
            
            const detailScroll = document.getElementById('detail-scroll-container');
            const detailScrollPos = detailScroll ? detailScroll.scrollTop : 0;
            
            const sidebarScroll = document.getElementById('sidebar-scroll-container');
            const sidebarScrollPos = sidebarScroll ? sidebarScroll.scrollTop : 0;

            state = { ...state, ...newState };
            
            if (needsProcess) {
                processDataForView();
            }
            
            const renderSkipKeys = ['expandedGroups', 'isSidebarOpen'];
            const keys = Object.keys(newState);
            const canSkipRender = keys.length > 0 && keys.every(k => renderSkipKeys.includes(k));

            if (!canSkipRender) {
                render(); 
                
                setTimeout(() => {
                    const newDashScroll = document.getElementById('dashboard-scroll-container');
                    if (newDashScroll) newDashScroll.scrollTop = dashScrollPos;
                    
                    const newDetailScroll = document.getElementById('detail-scroll-container');
                    if (newDetailScroll) newDetailScroll.scrollTop = detailScrollPos;
                    
                    const newSidebarScroll = document.getElementById('sidebar-scroll-container');
                    if (newSidebarScroll) newSidebarScroll.scrollTop = sidebarScrollPos;
                }, 0);
            }
            
            restoreFocus(); 
        }

        const escapeHtml = (unsafe) => (unsafe || '').toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        
        const hiraToKana = (str) => str.replace(/[\u3041-\u3096]/g, match => String.fromCharCode(match.charCodeAt(0) + 0x60));
        const normalizeForSearch = (str) => hiraToKana((str || '').toLowerCase().replace(/[\s　]/g, ''));
        
        const parseCSVRow = (str) => {
            const result = []; let cell = ''; let inQuotes = false;
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if (char === '"' && str[i + 1] === '"') { cell += '"'; i++; } 
                else if (char === '"') { inQuotes = !inQuotes; } 
                else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; } 
                else { cell += char; }
            }
            result.push(cell); 
            return result.map(v => {
                let trimmed = v.trim();
                if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
                    trimmed = trimmed.substring(1, trimmed.length - 1);
                }
                return trimmed;
            });
        };

        const formatDate = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const h = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${d} ${h}:${min}`;
        };

        const formatSleepTime = (minutes) => {
            if (minutes === null || minutes === undefined || isNaN(minutes)) return '-';
            const h = Math.floor(minutes / 60);
            const m = Math.round(minutes % 60);
            if (h > 0 && m > 0) return `${h}時間${m}分`;
            if (h > 0) return `${h}時間`;
            return `${m}分`;
        };

        const formatDev = (val, isTemp = false, isSleep = false) => {
            if (val === undefined || val === null || isNaN(val)) return '<span class="text-slate-300 text-[10px] font-bold">-</span>';
            const num = parseFloat(val);
            let absStr = Math.abs(num).toFixed(isTemp ? 1 : 0);
            
            if (isSleep) {
                const absNum = Math.abs(num);
                const h = Math.floor(absNum / 60);
                const m = Math.round(absNum % 60);
                absStr = h > 0 ? (m > 0 ? `${h}h${m}m` : `${h}h`) : `${m}m`;
            }

            if(num > 0) return `<span class="text-red-500 flex items-center justify-center gap-0.5"><i data-lucide="trending-up" class="w-3 h-3"></i>${absStr}</span>`;
            if(num < 0) return `<span class="text-blue-500 flex items-center justify-center gap-0.5"><i data-lucide="trending-down" class="w-3 h-3"></i>${absStr}</span>`;
            return `<span class="text-slate-400 flex items-center justify-center gap-0.5"><i data-lucide="minus" class="w-3 h-3"></i>0</span>`;
        };

        const formatDevForCSV = (dev, isTemp, isSleep) => {
            if (dev === undefined || dev === null) return '-';
            if (isSleep) {
                const absNum = Math.abs(dev);
                const h = Math.floor(absNum / 60);
                const m = Math.round(absNum % 60);
                const str = h > 0 ? (m > 0 ? `${h}h${m}m` : `${h}h`) : `${m}m`;
                return dev > 0 ? `+${str}` : (dev < 0 ? `-${str}` : str);
            }
            return dev > 0 ? `+${dev.toFixed(isTemp ? 1 : 0)}` : dev.toFixed(isTemp ? 1 : 0);
        };

        function checkAlertStatus(u) {
            if (!u.alerts || u.alerts.length === 0) return { hasRed: false };
            
            const latestTime = u.allRecords && u.allRecords.length > 0 
                ? new Date(u.allRecords[u.allRecords.length - 1].date).getTime() 
                : Date.now();
            const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
            
            let hasRed = false;
            for (const a of u.alerts) {
                const isWarningOrOk = a.message.includes('OK') || a.message.includes('正常') || a.message.includes('注意');
                const isExplicitAlert = a.message.includes('警報');
                const isAlert = isExplicitAlert || !isWarningOrOk;
                const alertTime = new Date(a.date).getTime();
                
                if (isAlert && !isNaN(alertTime) && (latestTime - alertTime) <= thirtyDaysMs) {
                    hasRed = true;
                    break;
                }
            }
            return { hasRed };
        }

        async function initApp() {
            try {
                const [history, status] = await Promise.all([DB.getAllHistory(), DB.getStatusMap()]);
                setState({ historyList: history || [], manualStatus: status || {}, loading: false });
                window.addEventListener('keydown', handleKeyDown);
            } catch (e) { 
                console.error("DB初期化エラー", e);
                setState({ loading: false });
            }
        }

        function handleKeyDown(e) {
            if (state.loading || (state.view !== 'dashboard' && state.view !== 'user-detail')) return;
            if (state.confirmModal || state.alertModalUid || state.csvExportModal) return; 
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            
            const userList = processedData.userList;
            if (userList.length === 0) return;
            
            let currentIndex = -1;
            if (state.view === 'user-detail') {
                currentIndex = userList.findIndex(u => u.uid === state.selectedUserId);
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                let nextIndex = currentIndex + 1;
                if (nextIndex >= userList.length) nextIndex = -1;
                
                if (nextIndex === -1) {
                    window.showDashboard();
                    scrollSidebarItemIntoView(null);
                } else {
                    window.setSelectedUserId(userList[nextIndex].uid);
                    scrollSidebarItemIntoView(userList[nextIndex].uid);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                let prevIndex = currentIndex - 1;
                if (prevIndex < -1) prevIndex = userList.length - 1;
                
                if (prevIndex === -1) {
                    window.showDashboard();
                    scrollSidebarItemIntoView(null);
                } else {
                    window.setSelectedUserId(userList[prevIndex].uid);
                    scrollSidebarItemIntoView(userList[prevIndex].uid);
                }
            }
        }

        function scrollSidebarItemIntoView(uid) {
            setTimeout(() => {
                const el = uid ? document.querySelector(`[data-user-id="${uid}"]`) : document.getElementById('sidebar-item-dashboard');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 50);
        }

        function generateStats(records) {
            const userStats = {};
            const cleanStr = (s) => (s || '').toString().replace(/[\s　]/g, '');

            records.forEach(record => {
                if (!record.lastName && !record.firstName && !record.officeName) return; 

                const uid = `${cleanStr(record.lastName)}_${cleanStr(record.firstName)}`;
                
                if (!userStats[uid]) {
                    userStats[uid] = {
                        uid, 
                        name: `${cleanStr(record.lastName)} ${cleanStr(record.firstName)}`.trim() || '名称未設定',
                        kanaName: `${cleanStr(record.kanaLast)} ${cleanStr(record.kanaFirst)}`.trim(),
                        officeName: record.officeName || '未所属',
                        birthDate: record.birthDate, allRecords: [], overallAverages: {},
                        lastMonthAverages: {}, monthlyAveragesArr: [], isDiscontinued: false,
                        discontinueReason: '', discontinueDate: null, discontinueNote: '',
                        alerts: [] 
                    };
                } else {
                    if (userStats[uid].officeName === '未所属' && record.officeName) {
                        userStats[uid].officeName = record.officeName;
                    }
                }
                
                const stats = userStats[uid];
                stats.allRecords.push({ 
                    date: record.date, 
                    sysBP: record.sysBP, diaBP: record.diaBP, pulse: record.pulse, spo2: record.spo2, temp: record.temp,
                    bmi: record.bmi, weight: record.weight, bloodSugar: record.bloodSugar, respRate: record.respRate,
                    turgor: record.turgor, anorexia: record.anorexia, medRecord: record.medRecord,
                    backPain: record.backPain, urinationPain: record.urinationPain, angina: record.angina, oralEnv: record.oralEnv,
                    sleepTime: record.sleepTime, waterIntake: record.waterIntake, walkTime5m: record.walkTime5m, fallHistory: record.fallHistory
                });

                if (record.alertMsg && record.alertMsg.toString().trim() !== '' && record.alertMsg.toString().trim() !== '-') {
                    stats.alerts.push({ date: record.date, message: record.alertMsg.toString().trim() });
                }
                
                if (record.isDiscontinued) {
                    stats.isDiscontinued = true;
                    if (record.discontinueDate) stats.discontinueDate = record.discontinueDate;
                    if (record.discontinueReason) stats.discontinueReason = record.discontinueReason;
                    if (record.discontinueNote) stats.discontinueNote = record.discontinueNote;
                }
            });

            return userStats;
        }

        function processDataForView() {
            processedData = { userList: [], userStatsMap: {}, offices: ['すべて'] };
            if (state.historyList.length === 0) return;

            const mergedUserStatsMap = {};
            const offices = new Set();
            const items = ['sysBP', 'diaBP', 'pulse', 'spo2', 'temp', 'bmi', 'weight', 'bloodSugar', 'respRate', 'turgor', 'anorexia', 'medRecord', 'backPain', 'urinationPain', 'angina', 'oralEnv', 'sleepTime', 'waterIntake', 'walkTime5m', 'fallHistory'];

            state.historyList.forEach(h => {
                Object.keys(h.userStatsMap).forEach(uid => {
                    const stats = h.userStatsMap[uid];
                    if (!mergedUserStatsMap[uid]) {
                        mergedUserStatsMap[uid] = {
                            uid: stats.uid,
                            name: stats.name,
                            kanaName: stats.kanaName,
                            officeName: stats.officeName,
                            birthDate: stats.birthDate,
                            allRecords: [],
                            overallAverages: {},
                            lastMonthAverages: {},
                            monthlyAveragesArr: [],
                            isDiscontinued: stats.isDiscontinued,
                            discontinueReason: stats.discontinueReason,
                            discontinueDate: stats.discontinueDate,
                            discontinueNote: stats.discontinueNote || '',
                            alerts: []
                        };
                    }
                    if (stats.officeName && stats.officeName !== '未所属') {
                        mergedUserStatsMap[uid].officeName = stats.officeName;
                    }
                    if (state.manualStatus[uid]) {
                        if (state.manualStatus[uid].isDiscontinued !== undefined) mergedUserStatsMap[uid].isDiscontinued = state.manualStatus[uid].isDiscontinued;
                        if (state.manualStatus[uid].discontinueReason !== undefined) mergedUserStatsMap[uid].discontinueReason = state.manualStatus[uid].discontinueReason;
                        if (state.manualStatus[uid].discontinueDate !== undefined) mergedUserStatsMap[uid].discontinueDate = state.manualStatus[uid].discontinueDate;
                        if (state.manualStatus[uid].discontinueNote !== undefined) mergedUserStatsMap[uid].discontinueNote = state.manualStatus[uid].discontinueNote;
                    }

                    if (stats.alerts && stats.alerts.length > 0) {
                        mergedUserStatsMap[uid].alerts.push(...stats.alerts);
                    }

                    const existingDates = new Set(mergedUserStatsMap[uid].allRecords.map(r => r.date));
                    stats.allRecords.forEach(r => {
                        if (!existingDates.has(r.date)) {
                            mergedUserStatsMap[uid].allRecords.push({ ...r });
                            existingDates.add(r.date);
                        }
                    });
                });
            });

            Object.keys(mergedUserStatsMap).forEach(uid => {
                const stats = mergedUserStatsMap[uid];
                offices.add(stats.officeName || '未所属');
                
                stats.allRecords.sort((a, b) => {
                    const da = new Date(a.date || 0).getTime();
                    const db = new Date(b.date || 0).getTime();
                    if (!isNaN(da) && !isNaN(db)) return da - db;
                    return (a.date || '').localeCompare(b.date || '');
                });
                
                items.forEach(item => {
                    const values = stats.allRecords.map(r => getValidVital(item, r[item])).filter(v => v !== null);
                    if (values.length > 0) stats.overallAverages[item] = values.reduce((a, b) => a + b, 0) / values.length;
                });

                if (stats.allRecords.length > 0) {
                    const latestDate = new Date(stats.allRecords[stats.allRecords.length - 1].date);
                    const lastMonthRecords = stats.allRecords.filter(r => {
                        const d = new Date(r.date);
                        if (isNaN(d.getTime())) return false;
                        return Math.ceil(Math.abs(latestDate - d) / (1000 * 60 * 60 * 24)) <= 30;
                    });
                    items.forEach(item => {
                        const values = lastMonthRecords.map(r => getValidVital(item, r[item])).filter(v => v !== null);
                        if (values.length > 0) stats.lastMonthAverages[item] = values.reduce((a, b) => a + b, 0) / values.length;
                    });
                }

                stats.allRecords = stats.allRecords.map(r => {
                    const deviations = {};
                    items.forEach(item => {
                        const val = getValidVital(item, r[item]);
                        if (stats.overallAverages[item] !== undefined && val !== null) {
                            deviations[item] = val - stats.overallAverages[item];
                        } else {
                            deviations[item] = null;
                        }
                    });
                    return { ...r, deviations };
                });
            });

            let userList = Object.values(mergedUserStatsMap).sort((a, b) => a.kanaName.localeCompare(b.kanaName, 'ja'));
            
            if (state.selectedOffice !== 'すべて') {
                userList = userList.filter(u => u.officeName === state.selectedOffice);
            }
            
            if (state.statusFilter === 'active') {
                userList = userList.filter(u => !u.isDiscontinued);
            } else if (state.statusFilter === 'discontinued') {
                userList = userList.filter(u => u.isDiscontinued);
            }

            if (state.alertFilter === 'hasAlert') {
                userList = userList.filter(u => checkAlertStatus(u).hasRed);
            } else if (state.alertFilter === 'noAlert') {
                userList = userList.filter(u => !checkAlertStatus(u).hasRed);
            }

            if (state.searchQuery) {
                const q = normalizeForSearch(state.searchQuery);
                userList = userList.filter(u => normalizeForSearch(u.name).includes(q) || normalizeForSearch(u.kanaName).includes(q));
            }

            processedData = { userList, userStatsMap: mergedUserStatsMap, offices: ['すべて', ...Array.from(offices).sort()] };
        }

        window.applySearchFilter = (q) => {
            const normalizedQ = normalizeForSearch(q);
            let visibleSidebarCount = 0;
            const groups = document.querySelectorAll('.sidebar-group');
            
            groups.forEach(group => {

            try {
                let successCount = 0;

                for (const f of files) {
                    if (!f.name.endsWith('.csv')) continue;
                    
                    const buffer = await f.arrayBuffer();
                    
                    let text = new TextDecoder('utf-8').decode(buffer);
                    text = text.replace(/^\uFEFF/, ''); 
                    
                    const testKeywords = ["事業所", "拠点", "施設", "利用者", "氏名", "名前", "血圧", "脈拍", "判定", "測定", "日付", "記録", "生年月日"];
                    const isUtf8Valid = testKeywords.some(kw => text.includes(kw));

                    if (!isUtf8Valid) {
                        text = new TextDecoder('shift-jis').decode(buffer);
                    }

                    const lines = text.split('\n').filter(l => l.trim().length > 0);
                    if (lines.length < 2) continue;

                    const headers = parseCSVRow(lines[0]);
                    
                    const usedIndexes = new Set();
                    
                    // 【神アプデ】完全一致を優先して探す、絶対に誤爆しない最強AI辞書エンジン！
                    const findIdx = (keywords) => {
                        for (const kw of keywords) {
                            const idx = headers.findIndex((h, i) => {
                                if (!h || usedIndexes.has(i)) return false;
                                const normalized = h.replace(/[\s　"'\r\n]/g, '');
                                return normalized === kw;
                            });
                            if (idx !== -1) {
                                usedIndexes.add(idx);
                                return idx;
                            }
                        }
                        for (const kw of keywords) {
                            const idx = headers.findIndex((h, i) => {
                                if (!h || usedIndexes.has(i)) return false;
                                const normalized = h.replace(/[\s　"'\r\n]/g, '');
                                return normalized.includes(kw);
                            });
                            if (idx !== -1) {
                                usedIndexes.add(idx);
                                return idx;
                            }
                        }
                        return -1;
                    };

                    // 【神アプデ】アラートの「ステータス」と利用停止の「ステータス」の誤爆を防ぐため、後ろから探す専用エンジン！
                    const findLastIdx = (keywords) => {
                        for (const kw of keywords) {
                            let lastIdx = -1;
                            for (let i = headers.length - 1; i >= 0; i--) {
                                if (headers[i] && !usedIndexes.has(i) && headers[i].replace(/[\s　"'\r\n]/g, '') === kw) {
                                    lastIdx = i;
                                    break;
                                }
                            }
                            if (lastIdx !== -1) {
                                usedIndexes.add(lastIdx);
                                return lastIdx;
                            }
                        }
                        for (const kw of keywords) {
                            let lastIdx = -1;
                            for (let i = headers.length - 1; i >= 0; i--) {
                                if (headers[i] && !usedIndexes.has(i) && headers[i].replace(/[\s　"'\r\n]/g, '').includes(kw)) {
                                    lastIdx = i;
                                    break;
                                }
                            }
                            if (lastIdx !== -1) {
                                usedIndexes.add(lastIdx);
                                return lastIdx;
                            }
                        }
                        return -1;
                    };

                    const mapIdx = { 
                        officeName: findIdx(["事業所名", "事業所", "拠点名", "拠点", "施設名", "施設", "店舗名", "店舗", "所属"]),

                        diaBP: findIdx(["血圧(拡張期)", "血圧（拡張期）", "最低血圧", "拡張期血圧", "拡張期"]), 
                        pulse: findIdx(["脈拍", "心拍"]), 
                        spo2: findIdx(["SpO2", "SPO2", "酸素飽和度"]), 
                        temp: findIdx(["体温"]),
                        bmi: findIdx(["BMI", "ＢＭＩ", "bmi"]),
                        weight: findIdx(["体重"]),
                        bloodSugar: findIdx(["血糖", "血糖値"]),
                        respRate: findIdx(["呼吸", "呼吸数"]),
                        turgor: findIdx(["脱水_スコア", "ツルゴール_スコア", "皮膚ツルゴール_スコア", "脱水", "ツルゴール", "皮膚ツルゴール"]),
                        anorexia: findIdx(["食欲不振_スコア", "食欲低下_スコア", "食欲不振", "食欲低下"]),
                        medRecord: findIdx(["服薬数_スコア", "服薬記録_スコア", "服薬状況_スコア", "服薬数(種)_スコア", "服薬数(種)", "服薬記録", "服薬状況", "服薬", "服薬数"]), 
                        backPain: findIdx(["背部痛_スコア", "腰痛_スコア", "背部痛", "腰痛"]),
                        urinationPain: findIdx(["排尿時痛_スコア", "排尿痛_スコア", "排尿時痛", "排尿痛"]),
                        angina: findIdx(["胸痛_スコア", "狭心痛_スコア", "狭心症_スコア", "胸痛", "狭心痛", "狭心症"]), 
                        oralEnv: findIdx(["口腔状態_スコア", "口腔環境_スコア", "口腔ケア_スコア", "口腔状態", "口腔環境", "口腔ケア", "口腔", "歯"]),
                        alertMsg: findIdx(["アラート", "警報", "警告", "EWS", "リスク", "スコア", "判定結果"]), 
                        disease: findIdx(["疾患名", "疾患内容", "疾患", "アラート内容", "病名", "疾患アラート"]), 
                        sleepTime: findIdx(["睡眠", "睡眠時間", "睡眠時間(分)"]),
                        waterIntake: findIdx(["水分", "水分量", "飲水", "水分量(mL)"]),
                        walkTime5m: findIdx(["5m歩行", "歩行時間", "5m", "5m歩行(秒)"]),
                        fallHistory: findIdx(["転倒歴_スコア", "転倒歴(月)_スコア", "転倒歴", "転倒歴(月)", "転倒有無", "転倒の有無", "直近の転倒", "過去の転倒"]), 
                        lastName: findIdx(["利用者名(姓)", "利用者名（姓）", "姓"]), 
                        firstName: findIdx(["利用者名(名)", "利用者名（名）", "名"]), 
                        kanaLast: findIdx(["利用者名カナ(姓)", "利用者名カナ（姓）", "カナ(姓)", "カナ（姓）", "カナ姓", "ふりがな(姓)"]), 
                        kanaFirst: findIdx(["利用者名カナ(名)", "利用者名カナ（名）", "カナ(名)", "カナ（名）", "カナ名", "ふりがな(名)"]), 
                        birthDate: findIdx(["生年月日", "誕生日"])
                    };
                    
                    const fullNameIdx = (mapIdx.lastName === -1 && mapIdx.firstName === -1) ? findIdx(["利用者名", "利用者氏名", "氏名", "名前", "お名前"]) : -1;
                    const kanaFullNameIdx = (mapIdx.kanaLast === -1 && mapIdx.kanaFirst === -1) ? findIdx(["利用者名カナ", "利用者カナ", "カナ", "ふりがな"]) : -1;
                    
                    // 【神アプデ】文字のデータを数値に変換するAI辞書！数字がないデータでも完璧に拾い上げるぜ！
                    const parseCategoryValue = (item, val) => {
                        if (val === null || val === undefined || val === '') return null;
                        
                        let strVal = String(val).replace(/[！-～]/g, function(s) {
                            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
                        }).replace(/["']/g, '').trim();
                        
                        if (/^\d+(\.\d+)?$/.test(strVal)) {
                            const n = Math.floor(parseFloat(strVal));
                            if ([10, 20, 30].includes(n)) return n;
                            if (n === 0) return 10;
                            if (n === 1) return 20;
                            if (n === 2) return 30;
                            if (n === 3) return 30;
                            if (n > 3) return 30;
                        }
                        
                        strVal = strVal.replace(/[\s　]/g, '');

                        const mappings = {
                            turgor: [{k: '3秒以上', v: 20}, {k: '遅延なし', v: 10}],
                            anorexia: [{k: '明らか', v: 30}, {k: 'わずか', v: 20}, {k: '減少無し', v: 10}, {k: '減少なし', v: 10}],
                            medRecord: [{k: '問題あり', v: 30}, {k: 'やや', v: 20}, {k: '問題なし', v: 10}],
                            backPain: [{k: '重度', v: 30}, {k: '軽度', v: 20}, {k: 'なし', v: 10}],
                            urinationPain: [{k: 'あり', v: 20}, {k: 'なし', v: 10}],
                            angina: [{k: '頻繁', v: 30}, {k: '重度', v: 30}, {k: '軽度', v: 20}, {k: '不定期', v: 20}, {k: '狭心', v: 20}, {k: '胸痛', v: 20}, {k: 'なし', v: 10}],
                            oralEnv: [{k: '重度', v: 30}, {k: '歯周病', v: 30}, {k: '軽度', v: 20}, {k: '歯肉炎', v: 20}, {k: '問題なし', v: 10}],
                            fallHistory: [{k: 'あり', v: 20}, {k: '転倒', v: 20}, {k: 'なし', v: 10}]
                        };

                        if (mappings[item]) {
                            for (const map of mappings[item]) {
                                if (strVal.includes(map.k)) return map.v;
                            }
                        }
                        return null;
                    };

                    const fileRecords = lines.slice(1).map(l => {
                        const c = parseCSVRow(l);
                        if (c.length < 3) return null; 
                        
                        let lName = '', fName = '', kLast = '', kFirst = '';
                        
                        if (fullNameIdx !== -1) {
                            lName = c[fullNameIdx] || '';
                        } else {
                            if (mapIdx.lastName !== -1) lName = c[mapIdx.lastName] || '';
                            if (mapIdx.firstName !== -1) fName = c[mapIdx.firstName] || '';
                        }
                        
                        if (kanaFullNameIdx !== -1) {
                            kLast = c[kanaFullNameIdx] || '';
                        } else {
                            if (mapIdx.kanaLast !== -1) kLast = c[mapIdx.kanaLast] || '';
                            if (mapIdx.kanaFirst !== -1) kFirst = c[mapIdx.kanaFirst] || '';
                        }

                        const rawAlert = mapIdx.alertMsg !== -1 ? (c[mapIdx.alertMsg] || '').trim() : '';
                        const rawDisease = mapIdx.disease !== -1 ? (c[mapIdx.disease] || '').trim() : (c[8] || '').trim();
                        
                        let combinedAlert = rawAlert;
                        if (rawDisease && rawDisease !== '-' && rawDisease !== 'ー') {
                            if (combinedAlert && combinedAlert !== '-' && combinedAlert !== 'ー') {
                                combinedAlert = `${combinedAlert} | 疾患内容: ${rawDisease}`;
                            } else {
                                combinedAlert = `疾患内容: ${rawDisease}`;
                            }
                        }

                        let parsedFallHistory = mapIdx.fallHistory !== -1 ? parseCategoryValue('fallHistory', c[mapIdx.fallHistory]) : null;
                        if ((parsedFallHistory === null || parsedFallHistory === 10) && combinedAlert.includes('転倒')) {
                            parsedFallHistory = 20;
                        }
                        
                        let parsedAngina = mapIdx.angina !== -1 ? parseCategoryValue('angina', c[mapIdx.angina]) : null;
                        if ((parsedAngina === null || parsedAngina === 10) && combinedAlert.includes('狭心')) {
                            parsedAngina = 30;
                        }
                        
                        // 【神アプデ】アラートの「ステータス」列との誤爆を完全に防ぐため、絶対領域(CSV末尾と固定インデックス)から判定するぜ！
                        // さらに、ハイフン( - )を退会理由と勘違いしないようにパーフェクトブロック！
                        let isDiscontinued = false;
                        let discontinueDate = '';
                        let discontinueReason = '';
                        let discontinueNote = '';

                        const checkDiscontinued = (statusVal, dateVal, reasonVal, noteVal) => {
                            const isInvalid = (v) => !v || v === '-' || v === 'ー' || v === 'null' || v === 'NULL';
                            
                            if (statusVal === '無効' || statusVal === '中止' || statusVal === '停止' || statusVal === '利用停止' || statusVal === '退会') {
                                isDiscontinued = true;
                                if (!discontinueReason) discontinueReason = 'ステータス: ' + statusVal;
                            }
                            if (!isInvalid(dateVal)) {
                                isDiscontinued = true;
                                discontinueDate = dateVal;
                            }
                            if (!isInvalid(reasonVal)) {
                                isDiscontinued = true;
                                discontinueReason = reasonVal;
                            }
                            if (!isInvalid(noteVal)) {
                                discontinueNote = noteVal;
                            }
                        };

                        const cLen = c.length;
                        // ① CSVの最後尾4列をチェック
                        if (cLen >= 4) {
                            checkDiscontinued(
                                c[cLen - 4].replace(/["']/g, '').trim(),
                                c[cLen - 3].replace(/["']/g, '').trim(),
                                c[cLen - 2].replace(/["']/g, '').trim(),
                                c[cLen - 1].replace(/["']/g, '').trim()
                            );
                        }

                        // ② 以前の固定列(170~173)も保険でチェック
                        if (cLen > 173) {
                            checkDiscontinued(
                                c[170] ? c[170].replace(/["']/g, '').trim() : '',
                                c[171] ? c[171].replace(/["']/g, '').trim() : '',
                                c[172] ? c[172].replace(/["']/g, '').trim() : '',
                                c[173] ? c[173].replace(/["']/g, '').trim() : ''
                            );
                        }

                        return { 
                            officeName: mapIdx.officeName !== -1 ? (c[mapIdx.officeName] || '').replace(/["']/g, '').trim() : '', 
                            lastName: lName, 
                            firstName: fName, 
                            kanaLast: kLast, 
                            kanaFirst: kFirst, 
                            birthDate: mapIdx.birthDate !== -1 ? c[mapIdx.birthDate] : '', 
                            date: mapIdx.date !== -1 ? c[mapIdx.date] : '', 
                            sysBP: mapIdx.sysBP !== -1 ? c[mapIdx.sysBP] : null, 
                            diaBP: mapIdx.diaBP !== -1 ? c[mapIdx.diaBP] : null, 
                            pulse: mapIdx.pulse !== -1 ? c[mapIdx.pulse] : null, 
                            spo2: mapIdx.spo2 !== -1 ? c[mapIdx.spo2] : null, 
                            temp: mapIdx.temp !== -1 ? c[mapIdx.temp] : null,
                            bmi: mapIdx.bmi !== -1 ? c[mapIdx.bmi] : null,
                            weight: mapIdx.weight !== -1 ? c[mapIdx.weight] : null,
                            bloodSugar: mapIdx.bloodSugar !== -1 ? c[mapIdx.bloodSugar] : null,
                            respRate: mapIdx.respRate !== -1 ? c[mapIdx.respRate] : null,
                            turgor: mapIdx.turgor !== -1 ? parseCategoryValue('turgor', c[mapIdx.turgor]) : null,
                            anorexia: mapIdx.anorexia !== -1 ? parseCategoryValue('anorexia', c[mapIdx.anorexia]) : null,
                            medRecord: mapIdx.medRecord !== -1 ? parseCategoryValue('medRecord', c[mapIdx.medRecord]) : null,
                            backPain: mapIdx.backPain !== -1 ? parseCategoryValue('backPain', c[mapIdx.backPain]) : null,
                            urinationPain: mapIdx.urinationPain !== -1 ? parseCategoryValue('urinationPain', c[mapIdx.urinationPain]) : null,
                            angina: parsedAngina,
                            oralEnv: mapIdx.oralEnv !== -1 ? parseCategoryValue('oralEnv', c[mapIdx.oralEnv]) : null,
                            sleepTime: mapIdx.sleepTime !== -1 ? c[mapIdx.sleepTime] : null,
                            waterIntake: mapIdx.waterIntake !== -1 ? c[mapIdx.waterIntake] : null,
                            walkTime5m: mapIdx.walkTime5m !== -1 ? c[mapIdx.walkTime5m] : null,
                            fallHistory: parsedFallHistory,
                            alertMsg: combinedAlert || null, 
                            isDiscontinued: isDiscontinued,
                            discontinueDate: discontinueDate,
                            discontinueReason: discontinueReason,
                            discontinueNote: discontinueNote
                        };
                    }).filter(Boolean);

                    if (fileRecords.length > 0) {
                        const stats = generateStats(fileRecords);
                        
                        const hId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9);
                        
                        const h = { 
                            id: hId, 
                            createdAt: formatDate(new Date()), 
                            fileNames: f.name, 
                            userCount: Object.keys(stats).length, 
                            recordCount: fileRecords.length, 
                            userStatsMap: stats 
                        };
                        await DB.saveHistory(h);
                        successCount++;
                    }
                }

                if (successCount > 0) {
                    const list = await DB.getAllHistory();
                    setState({ historyList: list, view: 'dashboard', uploadStatus: { isUploading: false, message: '' }, uploadSuccessMessage: `計算完了！ (${successCount}ファイルを保存)` });
                    setTimeout(() => setState({ uploadSuccessMessage: '' }), 3000);
                } else { 
                    setState({ uploadStatus: { isUploading: false, message: '' } }); 
                    alert("データが見つかんなかったわ。CSVの形式マジ確認してな！");
                }
            } catch (e) { 
                console.error(e);
                alert("エラー！文字化けかフォーマットの問題かも。マジ萎え〜。"); 
                setState({ uploadStatus: { isUploading: false, message: '' } }); 
            }
            event.target.value = '';
        };

        window.toggleHistorySelection = (event, id) => {
            if (event) event.stopPropagation(); 
            
            const current = state.selectedHistoryIds;
            const newSelected = current.includes(id) 
                ? current.filter(i => i !== id) 
                : [...current, id];
            
            state.selectedHistoryIds = newSelected;
            
            const checkbox = document.getElementById(`history-checkbox-${id}`);
            if(checkbox) checkbox.checked = newSelected.includes(id);
            
            const allSelected = state.historyList.length > 0 && newSelected.length === state.historyList.length;
            const allCb = document.getElementById('history-all-checkbox');
            if (allCb) allCb.checked = allSelected;
            
            const countEl = document.getElementById('history-selected-count');
            if(countEl) countEl.innerText = newSelected.length;
            
            const btn = document.getElementById('history-delete-btn');
            if (btn) btn.disabled = newSelected.length === 0;

            const row = document.getElementById(`history-row-${id}`);
            if (row) {
                if (newSelected.includes(id)) {
                    row.classList.add('bg-blue-50');
                } else {
                    row.classList.remove('bg-blue-50');
                }
            }
        };

        window.toggleHistoryAll = () => {
            let newSelected = [];
            if (state.selectedHistoryIds.length === state.historyList.length) {
                newSelected = []; 
            } else {
                newSelected = state.historyList.map(h => h.id); 
            }
            state.selectedHistoryIds = newSelected;
            
            const allSelected = state.historyList.length > 0 && newSelected.length === state.historyList.length;
            const allCb = document.getElementById('history-all-checkbox');
            if (allCb) allCb.checked = allSelected;
            
            const countEl = document.getElementById('history-selected-count');
            if(countEl) countEl.innerText = newSelected.length;
            
            state.historyList.forEach(h => {
                const cb = document.getElementById(`history-checkbox-${h.id}`);
                if (cb) cb.checked = newSelected.includes(h.id);

                const row = document.getElementById(`history-row-${h.id}`);
                if (row) {
                    if (newSelected.includes(h.id)) {
                        row.classList.add('bg-blue-50');
                    } else {
                        row.classList.remove('bg-blue-50');
                    }
                }
            });
            
            const btn = document.getElementById('history-delete-btn');
            if (btn) btn.disabled = newSelected.length === 0;
        };

        window.requestHistoryDelete = () => {
            const count = state.selectedHistoryIds.length;
            if (count === 0) return;
            setState({
                confirmModal: {
                    message: `マジで選択した ${count} 件のデータを削除するけど大丈夫そ？元には戻せねーからな！`,
                    onConfirm: "executeHistoryDelete()"
                }
            });
        };

        window.executeHistoryDelete = async () => {
            setState({ confirmModal: null, loading: true });
            const idsToDelete = state.selectedHistoryIds;

            for (const id of idsToDelete) {
                await DB.deleteHistory(id);
            }
            
            const newList = await DB.getAllHistory();
            state.selectedHistoryIds = [];
            
            if (newList.length === 0) {
                await DB.clearAllStatus();
                localStorage.removeItem('last_active_history_id');
                setState({ historyList: [], manualStatus: {}, loading: false });
            } else {
                setState({ historyList: newList, loading: false });
            }
        };

            setState({ confirmModal: null });
        };

            if (state.loading) {

            }

            const headerHTML = `
                <header class="bg-white border-b border-slate-200 px-6 py-2.5 flex flex-col md:flex-row md:items-center justify-between sticky top-0 z-50 shadow-sm gap-3">

                        ${(state.view === 'dashboard' || state.view === 'user-detail') ? `

                            <i data-lucide="menu" class="w-5 h-5"></i>
                        </button>
                        ` : ''}
                        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-1.5 rounded-lg shadow-sm"><i data-lucide="activity" class="w-4 h-4 text-white"></i></div>

                    </div>
                    <div class="flex flex-col md:flex-row items-center gap-3">
                        ${(state.view === 'dashboard' || state.view === 'user-detail') ? `
                            <div class="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                                <i data-lucide="building-2" class="w-3.5 h-3.5 text-slate-400"></i>
                                <select class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer" onchange="window.setSelectedOffice(this.value)">
                                    ${processedData.offices.map(o => `<option value="${escapeHtml(o)}" ${state.selectedOffice === o ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('')}
                                </select>
                            </div>
                            <div class="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                                <i data-lucide="filter" class="w-3.5 h-3.5 text-slate-400"></i>
                                <select class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer" onchange="window.setStatusFilter(this.value)">
                                    <option value="all" ${state.statusFilter === 'all' ? 'selected' : ''}>全ステータス</option>
                                    <option value="active" ${state.statusFilter === 'active' ? 'selected' : ''}>継続中のみ</option>
                                    <option value="discontinued" ${state.statusFilter === 'discontinued' ? 'selected' : ''}>停止のみ</option>
                                </select>
                            </div>
                            <div class="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                                <i data-lucide="bell" class="w-3.5 h-3.5 text-slate-400"></i>
                                <select class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer" onchange="window.setAlertFilter(this.value)">
                                    <option value="all" ${state.alertFilter === 'all' ? 'selected' : ''}>全アラート</option>
                                    <option value="hasAlert" ${state.alertFilter === 'hasAlert' ? 'selected' : ''}>警報あり</option>
                                    <option value="noAlert" ${state.alertFilter === 'noAlert' ? 'selected' : ''}>警報なし</option>
                                </select>
                            </div>
                        ` : ''}
                        <nav class="flex gap-1 bg-slate-100 p-1 rounded-lg">
                            <button onclick="window.setView('history')" class="flex items-center gap-1.5 px-3 py-1 rounded-md text-xs transition-all ${state.view === 'history' ? 'bg-white text-blue-700 font-bold shadow-sm' : 'text-slate-500 hover:text-slate-700 font-medium'}"><i data-lucide="history" class="w-3.5 h-3.5"></i><span>履歴</span></button>
                            <button onclick="window.showDashboard()" class="flex items-center gap-1.5 px-3 py-1 rounded-md text-xs transition-all ${(state.view === 'dashboard' || state.view === 'user-detail') ? 'bg-white text-blue-700 font-bold shadow-sm' : 'text-slate-500 hover:text-slate-700 font-medium'}"><i data-lucide="users" class="w-3.5 h-3.5"></i><span>利用者</span></button>
                            <button onclick="window.setView('upload')" class="flex items-center gap-1.5 px-3 py-1 rounded-md text-xs transition-all ${state.view === 'upload' ? 'bg-white text-blue-700 font-bold shadow-sm' : 'text-slate-500 hover:text-slate-700 font-medium'}"><i data-lucide="upload" class="w-3.5 h-3.5"></i><span>読込</span></button>
                        </nav>
                    </div>
                </header>`;

            let content = '';
            if (state.view === 'history') content = renderHistoryView();
            else if (state.view === 'upload') content = renderUploadView();
            else content = renderSplitView();

            let toasts = '';
            if (state.uploadStatus.isUploading) toasts = `<div class="fixed bottom-6 right-6 bg-blue-600 text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 animate-in slide-in-from-bottom-5"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span class="font-bold text-sm">${state.uploadStatus.message}</span></div>`;
            else if (state.uploadSuccessMessage) toasts = `<div class="fixed bottom-6 right-6 bg-green-500 text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 animate-in slide-in-from-bottom-5 fade-in"><i data-lucide="check-circle-2" class="w-5 h-5"></i><span class="font-bold text-sm">${state.uploadSuccessMessage}</span></div>`;

            let modalHTML = renderModal();
            let alertModalHTML = renderAlertModal();
            let csvModalHTML = renderCSVModal(); 

            root.innerHTML = `${toasts}${headerHTML}<main class="flex-1 flex flex-col overflow-hidden">${content}</main>${modalHTML}${alertModalHTML}${csvModalHTML}`;
            lucide.createIcons();
            if (state.view === 'user-detail') renderCharts();
        }

        function renderCSVModal() {
            if (!state.csvExportModal) return '';
            const { type, availableMonths, userName } = state.csvExportModal;

            const title = type === 'all' ? '全体データ出力' : '個人データ出力';
            const subtitle = type === 'all' ? '表示中の全利用者のデータを出力します' : `${escapeHtml(userName)} さん`;

            return `
            <div class="fixed inset-0 bg-slate-900/50 z-[100] flex items-center justify-center animate-in fade-in p-4 backdrop-blur-sm" onclick="window.closeCSVModal()">
                <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-auto border border-slate-100 flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                                <i data-lucide="file-spreadsheet" class="w-6 h-6 text-blue-600"></i>
                            </div>
                            <div>
                                <h3 class="font-black text-xl text-slate-800">${title}</h3>
                                <p class="text-xs font-bold text-slate-500">${subtitle}</p>
