                        </div>
                        <button onclick="window.closeCSVModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    
                    <p class="text-xs font-bold text-slate-500 mb-2">出力する月を選択してね！（複数選択OK）</p>
                    
                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2 mb-6 border border-slate-100 rounded-xl p-3 bg-slate-50">
                        <label class="flex items-center gap-3 p-2 bg-white rounded-lg border border-slate-200 cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="checkbox" class="csv-month-checkbox w-4 h-4 rounded text-blue-600 focus:ring-blue-500" value="all" onchange="const cbs = document.querySelectorAll('.csv-month-checkbox:not([value=\\'all\\'])'); cbs.forEach(cb => cb.checked = this.checked);" />
                            <span class="font-bold text-slate-700 text-sm">全期間</span>
                        </label>
                        ${availableMonths.map(ym => `
                        <label class="flex items-center gap-3 p-2 bg-white rounded-lg border border-slate-200 cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="checkbox" class="csv-month-checkbox w-4 h-4 rounded text-blue-600 focus:ring-blue-500" value="${escapeHtml(ym)}" />
                            <span class="font-bold text-slate-700 text-sm">${escapeHtml(ym)}</span>
                        </label>
                        `).join('')}
                    </div>
                    
                    <div class="flex justify-end gap-3 pt-2 border-t border-slate-100">
                        <button onclick="window.closeCSVModal()" class="px-5 py-2.5 rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors active:scale-95">キャンセル</button>
                        <button onclick="window.executeCSVExport()" class="px-5 py-2.5 rounded-xl font-bold text-sm bg-green-600 text-white hover:bg-green-700 transition-colors active:scale-95 shadow-md shadow-green-500/30 flex items-center gap-2">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>Excelで出力
                        </button>
                    </div>
                </div>
            </div>
            `;
        }

        function renderModal() {
            if (!state.confirmModal) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/50 z-[100] flex items-center justify-center animate-in fade-in p-4 backdrop-blur-sm">
                <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full mx-auto border border-slate-100">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
                            <i data-lucide="alert-triangle" class="w-6 h-6 text-red-600"></i>
                        </div>
                        <h3 class="font-black text-2xl text-slate-800">マジ確認！</h3>
                    </div>
                    <p class="text-slate-600 mb-8 font-bold">${escapeHtml(state.confirmModal.message)}</p>
                    <div class="flex justify-end gap-3">
                        <button onclick="window.closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors active:scale-95">やめとく</button>
                        <button onclick="window.${state.confirmModal.onConfirm}" class="px-5 py-2.5 rounded-xl font-bold text-sm bg-red-500 text-white hover:bg-red-600 transition-colors active:scale-95 shadow-md shadow-red-500/30">オッケー！</button>
                    </div>
                </div>
            </div>
            `;
        }

        function renderAlertModal() {
            if (!state.alertModalUid) return '';
            const u = processedData.userStatsMap[state.alertModalUid];
            if (!u) return '';
            
            const uniqueAlerts = [];
            const seen = new Set();
            [...u.alerts].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(a => {
                const key = a.date + a.message;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueAlerts.push(a);
                }
            });

            const displayAlerts = uniqueAlerts.filter(a => {
                if (state.alertModalMode === 'all') return true;
                
                const isWarningOrOk = a.message.includes('OK') || a.message.includes('正常') || a.message.includes('注意');
                const isExplicitAlert = a.message.includes('警報');
                
                if (isExplicitAlert) return true;
                if (isWarningOrOk) return false;
                
                return true; 
            });

            const getAlertStyle = (msg) => {
                if (msg.includes('OK') || msg.includes('正常')) return { 
                    bg: 'bg-green-50', hoverBg: 'hover:bg-green-100/50', border: 'border-green-100', text: 'text-green-700', icon: 'check-circle', iconColor: 'text-green-500', labelBg: 'bg-green-100', labelText: 'text-green-600', label: '正常/OK',
                    diseaseBg: 'bg-green-100', diseaseText: 'text-green-700', diseaseBorder: 'border-green-200', diseaseIcon: 'check'
                };
                if (msg.includes('注意')) return { 
                    bg: 'bg-amber-50', hoverBg: 'hover:bg-amber-100/50', border: 'border-amber-100', text: 'text-amber-700', icon: 'alert-circle', iconColor: 'text-amber-500', labelBg: 'bg-amber-100', labelText: 'text-amber-600', label: '注意',
                    diseaseBg: 'bg-amber-100', diseaseText: 'text-amber-700', diseaseBorder: 'border-amber-200', diseaseIcon: 'alert-circle'
                };
                return { 
                    bg: 'bg-red-50', hoverBg: 'hover:bg-red-100/50', border: 'border-red-100', text: 'text-red-700', icon: 'alert-triangle', iconColor: 'text-red-500', labelBg: 'bg-red-500', labelText: 'text-white', label: '警報',
                    diseaseBg: 'bg-red-100', diseaseText: 'text-red-700', diseaseBorder: 'border-red-200', diseaseIcon: 'alert-triangle'
                };
            };

            return `
            <div class="fixed inset-0 bg-slate-900/50 z-[100] flex items-center justify-center animate-in fade-in p-4 backdrop-blur-sm" onclick="window.closeAlertHistory()">
                <div class="bg-white rounded-3xl shadow-2xl p-6 max-w-xl w-full mx-auto border border-slate-100 flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">
                    
                    <div class="flex justify-between items-start mb-4 flex-shrink-0">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center">
                                <i data-lucide="bell-ring" class="w-6 h-6 text-slate-600"></i>
                            </div>
                            <div>
                                <h3 class="font-black text-xl text-slate-800 flex items-center gap-2">アラート履歴 <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">${escapeHtml(u.name)}</span></h3>
                                <p class="text-xs font-bold text-slate-400 mt-0.5">※分析結果に基づくアラート一覧</p>
                            </div>
                        </div>
                        <button onclick="window.closeAlertHistory()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    
                    <div class="flex gap-2 mb-4 bg-slate-50 p-1 rounded-xl flex-shrink-0">
                        <button onclick="window.setAlertModalMode('alertOnly')" class="flex-1 py-2 text-xs font-black rounded-lg transition-all ${state.alertModalMode === 'alertOnly' ? 'bg-white text-red-600 shadow-sm border border-red-100' : 'text-slate-400 hover:text-slate-600'}">🚨 警報のみ表示</button>
                        <button onclick="window.setAlertModalMode('all')" class="flex-1 py-2 text-xs font-black rounded-lg transition-all ${state.alertModalMode === 'all' ? 'bg-white text-blue-600 shadow-sm border border-blue-100' : 'text-slate-400 hover:text-slate-600'}">📋 全履歴 (OK/注意含む)</button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-2">
                        <div class="space-y-3">
                            ${displayAlerts.length > 0 ? displayAlerts.map((a, index) => {
                                const s = getAlertStyle(a.message);
                                
                                const parts = a.message.split(' | 疾患内容: ');
                                let mainMsg = parts[0];
                                let diseaseMsg = parts[1] || '';
                                
                                if (!diseaseMsg && a.message.startsWith('疾患内容: ')) {
                                    mainMsg = '';
                                    diseaseMsg = a.message.replace('疾患内容: ', '');
                                }

                                if (['警報', '注意', 'OK', '正常', 'アラート', '-'].includes(mainMsg.trim())) {
                                    mainMsg = ''; 
                                } else if (mainMsg) {
                                    mainMsg = `<div class="font-bold text-[13px] ${s.text} leading-relaxed">${escapeHtml(mainMsg)}</div>`;
                                }

                                const diseaseHtml = diseaseMsg ? `<div class="${mainMsg ? 'mt-2' : 'mt-1'}"><span class="text-[13px] font-black ${s.diseaseText} ${s.diseaseBg} px-2.5 py-1 rounded-md inline-flex items-center gap-1 shadow-sm border ${s.diseaseBorder}"><i data-lucide="${s.diseaseIcon}" class="w-3.5 h-3.5"></i>${escapeHtml(diseaseMsg)}</span></div>` : '';
                                
                                if (!mainMsg && !diseaseHtml) {
                                    mainMsg = `<div class="font-bold text-[13px] ${s.text} leading-relaxed">異常変動を検知しました</div>`;
                                }
                                
                                const alertId = `alert-detail-${index}`;
                                const record = u.allRecords.find(r => r.date === a.date);
                                let detailsHtml = '';
                                
                                if (record) {
                                    const numKeys = ['sysBP', 'diaBP', 'pulse', 'spo2', 'temp', 'respRate', 'weight', 'sleepTime', 'waterIntake', 'walkTime5m'];
                                    const numLabels = { sysBP: '血圧(収)', diaBP: '血圧(拡)', pulse: '脈拍', spo2: 'SpO2', temp: '体温', respRate: '呼吸数', weight: '体重', sleepTime: '睡眠時間', waterIntake: '水分量', walkTime5m: '5m歩行' };
                                    const numUnits = { sysBP: 'mmHg', diaBP: 'mmHg', pulse: 'bpm', spo2: '%', temp: '℃', respRate: '回/分', weight: 'kg', sleepTime: '', waterIntake: 'ml', walkTime5m: '秒' };

                                    const catKeys = ['turgor', 'anorexia', 'medRecord', 'backPain', 'urinationPain', 'angina', 'oralEnv', 'fallHistory'];

                                    const numDetailsList = numKeys.map(k => {
                                        let val = getValidVital(k, record[k]);
                                        let dev = record.deviations?.[k];

                                        if (val === null) {
                                            const pastRecords = u.allRecords.filter(r => new Date(r.date.replace(/-/g, '/')) <= new Date(record.date.replace(/-/g, '/')));
                                            const lastValid = [...pastRecords].reverse().find(r => isValidVital(k, r[k]));
                                            if (lastValid) {
                                                val = parseFloat(lastValid[k]);
                                                dev = lastValid.deviations?.[k];
                                            }
                                        }

                                        if (val === null) return '';

                                        let valStr = val.toFixed(k==='temp'?1:0);
                                        let unitStr = numUnits[k] ? `<span class="text-[8px] text-slate-400 font-bold">${numUnits[k]}</span>` : '';
                                        if (k === 'sleepTime') {
                                            valStr = formatSleepTime(val);
                                            unitStr = '';
                                        }

                                        return `<div class="flex justify-between items-center py-1 border-b border-slate-100/50 last:border-0">
                                            <span class="text-[10px] text-slate-500 font-bold">${numLabels[k]}</span>
                                            <div class="flex items-center gap-3">
                                                <div class="flex items-baseline gap-0.5 w-12 justify-end">
                                                    <span class="text-xs font-black text-slate-700">${valStr}</span>
                                                    ${unitStr}
                                                </div>
                                                <div class="w-14 flex justify-end">
                                                    ${formatDev(dev, k === 'temp', k === 'sleepTime')}
                                                </div>
                                            </div>
                                        </div>`;
                                    }).filter(Boolean).join('');

                                    const catDetailsList = catKeys.map(k => {
                                        let val = getValidVital(k, record[k]);

                                        if (val === null) {
                                            const pastRecords = u.allRecords.filter(r => new Date(r.date.replace(/-/g, '/')) <= new Date(record.date.replace(/-/g, '/')));
                                            const lastValid = [...pastRecords].reverse().find(r => isValidVital(k, r[k]));
                                            if (lastValid) {
                                                val = parseFloat(lastValid[k]);
                                            }
                                        }

                                        if (k === 'fallHistory' && val === null && a.message.includes('転倒')) {
                                            val = 20;
                                        }
                                        if (k === 'angina' && val === null && a.message.includes('狭心')) {
                                            val = 30;
                                        }

                                        if (val === null) return '';
                                        
                                        let label = catLabels[k][val] || val;
                                        if (k === 'medRecord') {
                                            const texts = {
                                                10: '服薬数5種類以下・服薬コンプライアンス問題なし',
                                                20: '服薬数5種類以上または服薬コンプライアンス問題あり',
                                                30: '服薬数5種類以上・服薬コンプライアンス問題あり'
                                            }[val];
                                            if (texts) label = texts;
                                        }
                                        
                                        let statusColor = 'text-slate-400';
                                        if (val === 30 || (k === 'fallHistory' && val === 20)) statusColor = 'text-red-500 font-black';
                                        else if (val === 20) statusColor = 'text-amber-500 font-black';

                                        let extraInfo = '';
                                        if (k === 'fallHistory') {
                                            const pastRecordsToNow = u.allRecords.filter(r => new Date(r.date.replace(/-/g, '/')) <= new Date(record.date.replace(/-/g, '/')));
                                            const fallsToNow = pastRecordsToNow.filter(r => isValidVital('fallHistory', r.fallHistory) && parseFloat(r.fallHistory) === 20).reverse();
                                            if (fallsToNow.length > 0) {
                                                extraInfo = `<div class="w-full text-right text-[9px] text-slate-500 mt-0.5">最新: ${fallsToNow[0].date.substring(0,10)} (計 ${fallsToNow.length} 回)</div>`;
                                            } else if (val === 20 && a.message.includes('転倒')) {
                                                extraInfo = `<div class="w-full text-right text-[9px] text-slate-500 mt-0.5">最新: ${record.date.substring(0,10)} (計 1 回)</div>`;
                                            }
                                        }

                                        return `<div class="flex flex-col py-1 border-b border-slate-100/50 last:border-0">
                                            <div class="flex justify-between items-center">
                                                <span class="text-[10px] text-slate-500 font-bold">${catLabelsTitle[k]}</span>
                                                <div class="flex items-center gap-3">
                                                    <div class="flex items-baseline gap-0.5 w-auto justify-end">
                                                        <span class="text-[10px] font-bold ${statusColor} truncate max-w-[150px] text-right" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
                                                    </div>
                                                    <div class="w-14 flex justify-end text-[10px] text-slate-300">
                                                        -
                                                    </div>
                                                </div>
                                            </div>
                                            ${extraInfo}
                                        </div>`;
                                    }).filter(Boolean).join('');

                                    const detailsList = numDetailsList + catDetailsList;

                                    if (detailsList) {
                                        detailsHtml = `
                                        <div id="${alertId}" class="hidden mt-3 pt-3 border-t ${s.border} border-dashed animate-in fade-in slide-in-from-top-2">
                                            <div class="text-[10px] font-black text-slate-400 mb-1.5 flex items-center justify-between">
                                                <div class="flex items-center gap-1"><i data-lucide="bar-chart-2" class="w-3 h-3"></i> 測定値詳細</div>
                                                <span class="text-[8px] opacity-70">測定値 / 平均差</span>
                                            </div>
                                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-0.5 bg-white/50 p-2 rounded-lg">
                                                ${detailsList}
                                            </div>
                                        </div>`;
                                    }
                                }
                                
                                return `
                                <div class="${s.bg} ${s.hoverBg} border ${s.border} rounded-2xl p-4 flex flex-col cursor-pointer transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 group" onclick="const d = document.getElementById('${alertId}'); if(d) { d.classList.toggle('hidden'); }">
                                    <div class="flex gap-3 items-start">
                                        <div class="mt-0.5 ${s.iconColor} bg-white p-1.5 rounded-full shadow-sm flex-shrink-0">
                                            <i data-lucide="${s.icon}" class="w-4 h-4"></i>
                                        </div>
                                        <div class="flex-1">
                                            <div class="flex items-center justify-between mb-1.5">
                                                <div class="flex items-center gap-2">
                                                    <span class="text-[10px] font-black ${s.labelText} ${s.labelBg} px-2 py-0.5 rounded uppercase tracking-wider">${s.label}</span>
                                                    <span class="text-[11px] font-bold text-slate-400"><i data-lucide="clock" class="w-3 h-3 inline mr-0.5 mb-0.5"></i>${a.date.substring(0,16)}</span>
                                                </div>
                                                ${detailsHtml ? `<i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"></i>` : ''}
                                            </div>
                                            ${mainMsg}
                                            ${diseaseHtml}
                                        </div>
                                    </div>
                                    ${detailsHtml}
                                </div>
                                `
                            }).join('') : `
                                <div class="text-center py-12 flex flex-col items-center justify-center opacity-70">
                                    <div class="bg-slate-100 p-4 rounded-full mb-3"><i data-lucide="check-circle-2" class="w-8 h-8 text-slate-400"></i></div>
                                    <p class="font-black text-slate-500">${state.alertModalMode === 'alertOnly' ? '現在、ヤバめな警報は出てないっしょ！✨' : '履歴がまだないみたいだぜ！'}</p>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderHistoryView() {
            if (state.historyList.length === 0) {
                return `
                <div class="flex-1 flex flex-col items-center justify-center p-12">
                    <div class="text-center animate-in fade-in">
                        <div class="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="database" class="w-12 h-12 text-slate-300"></i>

                </div>
                
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in">

                        <label class="flex items-center gap-2 cursor-pointer font-bold text-slate-700 hover:text-blue-600 transition-colors ml-2">

                        </label>
                        <div class="flex items-center gap-4">
                            <div class="text-xs font-bold text-slate-500">選択中: <span id="history-selected-count" class="text-blue-600">${state.selectedHistoryIds.length}</span> 件</div>
                            <button id="history-delete-btn" onclick="window.requestHistoryDelete()" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg font-bold text-xs border border-red-100 transition-all hover:bg-red-100 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" ${state.selectedHistoryIds.length === 0 ? 'disabled' : ''}>
                                <i data-lucide="trash-2" class="w-3.5 h-3.5 inline-block align-text-bottom mr-1"></i>データ削除
                            </button>
                        </div>
                    </div>

                    <div class="divide-y divide-slate-100">
                        ${state.historyList.map(h => `
                            <label id="history-row-${h.id}" class="flex flex-col md:flex-row md:items-center gap-2 p-1.5 hover:bg-blue-50 cursor-pointer transition-colors relative group ${state.selectedHistoryIds.includes(h.id) ? 'bg-blue-50' : ''}">
                                
                                <div class="flex items-center pl-2">
                                    <input id="history-checkbox-${h.id}" type="checkbox" class="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 cursor-pointer" ${state.selectedHistoryIds.includes(h.id) ? 'checked' : ''} onchange="window.toggleHistorySelection(event, '${h.id}')" />
                                </div>

                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <div class="bg-blue-100 text-blue-700 px-2 py-1 rounded-md font-black text-[10px] flex items-center gap-1 whitespace-nowrap shadow-sm border border-blue-200">
                                        <i data-lucide="calendar" class="w-3 h-3"></i>${h.createdAt}
                                    </div>
                                </div>
                                
                                <div class="font-bold text-slate-800 text-xs truncate flex-1 flex items-center gap-2">
                                    <i data-lucide="file-text" class="w-3.5 h-3.5 text-slate-400 flex-shrink-0"></i>
                                    <span class="truncate">${escapeHtml(h.fileNames)}</span>
                                </div>

                                <div class="col-span-3 flex flex-col pl-2"><span class="text-[8px] text-slate-400 font-bold leading-none mb-0.5">${escapeHtml(u.kanaName)}</span><span class="font-bold text-slate-700 text-xs leading-none flex items-center gap-1">${escapeHtml(u.name)} <i data-lucide="bell" class="w-3.5 h-3.5 cursor-pointer hover:scale-110 transition-transform ${alertStatus.hasRed ? 'text-red-500 fill-red-500' : 'text-slate-300 fill-slate-300'}" onclick="window.openAlertHistory('${u.uid}', event)" title="アラート履歴を表示"></i></span></div>

        function renderDetailContent() {
            const u = processedData.userStatsMap[state.selectedUserId];
            if (!u) return `<div class="flex-1 p-12 text-center text-slate-400 font-bold">左のリストから利用者を選択してな！✨</div>`;

            const labels = { pulse: '脈拍', spo2: 'SpO2', temp: '体温', respRate: '呼吸数', weight: '体重', sleepTime: '睡眠時間', waterIntake: '水分量', walkTime5m: '5m歩行', bmi: 'BMI', bloodSugar: '血糖値' };
            const units = { pulse: 'bpm', spo2: '%', temp: '℃', respRate: '回/分', weight: 'kg', sleepTime: '', waterIntake: 'ml', walkTime5m: '秒', bmi: '', bloodSugar: 'mg/dL' };
            const icons = { pulse: 'heart-pulse', spo2: 'wind', temp: 'thermometer', respRate: 'activity', weight: 'scale', sleepTime: 'moon', waterIntake: 'droplet', walkTime5m: 'footprints', bmi: 'calculator', bloodSugar: 'test-tube' };
            const catIcons = { medRecord: 'pill', oralEnv: 'smile', turgor: 'hand', anorexia: 'utensils', backPain: 'activity', urinationPain: 'droplets', angina: 'heart' };
            
            const latestSysValid = [...u.allRecords].reverse().find(r => isValidVital('sysBP', r.sysBP));
            const latestDiaValid = [...u.allRecords].reverse().find(r => isValidVital('diaBP', r.diaBP));
            
            const avgSys = u.overallAverages.sysBP || 0;
            const avgDia = u.overallAverages.diaBP || 0;
            const nowSys = latestSysValid ? parseFloat(latestSysValid.sysBP) : null;
            const nowDia = latestDiaValid ? parseFloat(latestDiaValid.diaBP) : null;

            const devSys = latestSysValid?.deviations?.sysBP !== undefined && latestSysValid.deviations.sysBP !== null ? latestSysValid.deviations.sysBP : (avgSys && nowSys !== null ? (nowSys - avgSys) : null);
            const devDia = latestDiaValid?.deviations?.diaBP !== undefined && latestDiaValid.deviations.diaBP !== null ? latestDiaValid.deviations.diaBP : (avgDia && nowDia !== null ? (nowDia - avgDia) : null);

            const bpColorClass = (!latestSysValid && !latestDiaValid) ? 'text-slate-600 bg-slate-50 border-slate-100' : (devSys > 15 ? 'text-red-600 bg-red-50 border-red-100' : devSys < -15 ? 'text-blue-600 bg-blue-50 border-blue-100' : 'text-slate-600 bg-slate-50 border-slate-100');

            const bpCard = `
            <div class="border p-3.5 rounded-xl ${bpColorClass} shadow-sm flex flex-col justify-between transition-all hover:shadow-md bg-white">
                <div class="flex justify-between items-start mb-1.5 gap-2">
                    <div class="text-[10px] font-black text-slate-500 uppercase tracking-wider flex items-center gap-1 shrink-0">
                        <i data-lucide="activity" class="w-3.5 h-3.5"></i>血圧
                    </div>
                    <div class="flex flex-col items-center bg-white/60 px-1.5 py-0.5 rounded-lg border border-slate-100 shadow-sm backdrop-blur-sm min-w-0 w-[60px]">

                    </div>
                </div>
                
                <div class="flex items-baseline gap-0.5 my-0.5">
                    <div class="text-2xl font-black tracking-tighter text-slate-700">${latestSysValid ? nowSys.toFixed(0) : '-'}</div>
                    <div class="text-base font-bold text-slate-400 tracking-tighter">/${latestDiaValid ? nowDia.toFixed(0) : '-'}</div>
                    <div class="text-[9px] font-bold text-slate-400 ml-1">mmHg</div>
                </div>
                
                <div class="flex justify-between items-end mt-2 pt-1.5 border-t border-slate-200/50">
                    <div class="text-[9px] font-bold text-slate-500">
                        <span class="text-slate-400 mr-1">平均</span>${avgSys ? Math.floor(avgSys) : '-'}/${avgDia ? Math.floor(avgDia) : '-'}

                    <div class="text-[8px] font-bold text-slate-400 flex items-center gap-1">
                        <i data-lucide="clock" class="w-2.5 h-2.5"></i>${latestSysValid?.date?.substring(0,10) || latestDiaValid?.date?.substring(0,10) || '-'}
                    </div>
                </div>
            </div>`;

            const cardMap = {};
            cardMap['bp'] = bpCard;

            ['pulse', 'spo2', 'temp', 'respRate', 'weight', 'bmi', 'bloodSugar', 'sleepTime', 'waterIntake', 'walkTime5m'].forEach(k => {
                const isTemp = k === 'temp';
                const latestValid = [...u.allRecords].reverse().find(r => isValidVital(k, r[k]));
                
                const avg = u.overallAverages[k] || 0;
                const now = latestValid ? parseFloat(latestValid[k]) : null;
                const dev = latestValid?.deviations?.[k] !== undefined && latestValid.deviations[k] !== null ? latestValid.deviations[k] : (avg && now !== null ? (now - avg) : null);
                
                const colorClass = now === null ? 'text-slate-600 bg-slate-50 border-slate-100' : (dev > 15 ? 'text-red-600 bg-red-50 border-red-100' : dev < -15 ? 'text-blue-600 bg-blue-50 border-blue-100' : 'text-slate-600 bg-slate-50 border-slate-100');
                
                let nowDisplay = latestValid ? now.toFixed(isTemp ? 1 : 0) : '-';
                let avgDisplay = avg ? (isTemp ? avg.toFixed(1) : Math.floor(avg)) : '-';
                let unitDisplay = units[k] ? `<div class="text-[9px] font-bold text-slate-400 ml-1">${units[k]}</div>` : '';
                
                if (k === 'sleepTime') {
                    nowDisplay = latestValid ? formatSleepTime(now) : '-';
                    avgDisplay = avg ? formatSleepTime(avg) : '-';
                    unitDisplay = ''; 
                }

                cardMap[k] = `
                <div class="border p-3.5 rounded-xl ${colorClass} shadow-sm flex flex-col justify-between transition-all hover:shadow-md bg-white">
                    <div class="flex justify-between items-start mb-1.5 gap-2">

                        </div>
                        <div class="text-[8px] font-bold text-slate-400 flex items-center gap-1">
                            <i data-lucide="clock" class="w-2.5 h-2.5"></i>${latestValid?.date?.substring(0,10) || '-'}
                        </div>
                    </div>
                </div>`;
            });

            ['medRecord', 'oralEnv', 'turgor', 'anorexia', 'backPain', 'urinationPain', 'angina'].forEach(k => {
                const latestValid = [...u.allRecords].reverse().find(r => isValidVital(k, r[k]));
                const now = latestValid ? parseFloat(latestValid[k]) : null;
                
                let bgClass = 'bg-white border-slate-200 text-slate-800 opacity-70';
                let iconColor = 'text-slate-400';
                let titleColor = 'text-slate-400';
                
                if (now !== null) {
                    if (now === 30 || (k === 'fallHistory' && now === 20)) {
                        bgClass = 'bg-red-50 border-red-200 text-red-900';
                        iconColor = 'text-red-500';
                        titleColor = 'text-red-700';
                    } else if (now === 20) {
                        bgClass = 'bg-amber-50 border-amber-200 text-amber-900';
                        iconColor = 'text-amber-500';
                        titleColor = 'text-amber-700';
                    } else {
                        bgClass = 'bg-green-50 border-green-200 text-green-900';
                        iconColor = 'text-green-500';
                        titleColor = 'text-green-700';
                    }
                }

                let labelHtml = `<div class="text-base font-black truncate my-1">-</div>`;

                if (now !== null) {
                    if (k === 'medRecord') {
                        const texts = {

                            20: ['服薬数5種類以上', 'または服薬コンプライアンス問題あり'],

                        }[now] || [now, ''];
                        labelHtml = `

                            <div class="text-[10px] font-bold opacity-80 leading-tight">${texts[1]}</div>
                        </div>`;
                    } else if (k === 'oralEnv') {
                        const text = { 10: '問題なし', 20: '軽度(歯肉炎)疑い', 30: '重度(歯周病)疑い' }[now] || now;
                        labelHtml = `<div class="text-base font-black truncate my-1">${text}</div>`;

                        const text = catLabels[k][now] || now;

                        labelHtml = `<div class="${textClass} my-1">${text}</div>`;

                cardMap[k] = `<div class="border p-3.5 rounded-xl ${bgClass} shadow-sm flex flex-col justify-between transition-all hover:shadow-md">

                    ${labelHtml}
                    <div class="flex justify-between items-end mt-2 pt-1.5 border-t ${now === null ? 'border-slate-100' : bgClass.replace('bg-', 'border-').replace('50', '200')}/50">
                        <div></div>
                        <div class="text-[8px] font-bold opacity-70 flex items-center gap-1">
                            <i data-lucide="clock" class="w-2.5 h-2.5"></i>${latestValid ? latestValid.date.substring(0,10) : '-'}
                        </div>
                    </div>
                </div>`;
            });

            const falls = u.allRecords.filter(r => isValidVital('fallHistory', r.fallHistory) && parseFloat(r.fallHistory) === 20).reverse();
            const latestFall = [...u.allRecords].reverse().find(r => isValidVital('fallHistory', r.fallHistory));
            const nowFall = latestFall ? parseFloat(latestFall.fallHistory) : null;
            
            const isFallNow = nowFall === 20;
            let bgClass = 'bg-white border-slate-200 text-slate-800 opacity-70';
            let iconColor = 'text-slate-400';
            let titleColor = 'text-slate-400';
            
            if (nowFall !== null || falls.length > 0) {
                if (isFallNow) {
                    bgClass = 'bg-red-50 border-red-200 text-red-900';
                    iconColor = 'text-red-500';
                    titleColor = 'text-red-700';
                } else if (falls.length > 0) {
                    bgClass = 'bg-amber-50 border-amber-200 text-amber-900';
                    iconColor = 'text-amber-500';
                    titleColor = 'text-amber-700';
                } else {
                    bgClass = 'bg-green-50 border-green-200 text-green-900';
                    iconColor = 'text-green-500';
                    titleColor = 'text-green-700';
                }
            }

            let fallStatusText = 'なし';
            if (falls.length > 0) fallStatusText = 'あり';

            let fallListHtml = '';
            if (falls.length > 0) {
                fallListHtml = `<div class="mt-2 text-[9px] border-t ${isFallNow ? 'border-red-200/50' : 'border-amber-200/50'} pt-1.5 h-10 overflow-y-auto custom-scrollbar">
                    <div class="font-bold mb-0.5 opacity-80 leading-none flex justify-between">
                        <span>最新: ${falls[0].date.substring(0,10)}</span>
                        <span>計 ${falls.length} 回</span>
                    </div>
                    ${falls.length > 1 ? `<div class="leading-tight mt-1 text-[8px] text-slate-500">${falls.slice(1).map(f => `<div>・${f.date.substring(0,10)}</div>`).join('')}</div>` : ''}
                </div>`;
            } else {
                fallListHtml = `<div class="mt-2 text-[9px] border-t ${nowFall === null ? 'border-slate-100' : 'border-green-200/50'} pt-1.5 opacity-60">転倒履歴なし</div>`;
            }

            cardMap['fallHistory'] = `<div class="border p-3.5 rounded-xl ${bgClass} shadow-sm flex flex-col justify-between transition-all hover:shadow-md">
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1">
                    <i data-lucide="alert-octagon" class="w-3.5 h-3.5 ${iconColor}"></i>転倒歴
                </div>
                <div class="text-base font-black my-1 flex items-end gap-2">
                    ${nowFall === null && falls.length === 0 ? '-' : fallStatusText}
                </div>
                ${fallListHtml}
            </div>`;

            const orderedCardsHtml = displayOrder.map(k => cardMap[k] || '').join('');

            const alertStatus = checkAlertStatus(u);
            const bellBtnClass = alertStatus.hasRed 
                ? 'text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100' 
                : 'text-slate-400 hover:text-slate-500 bg-slate-100 hover:bg-slate-200';
            const bellIconClass = alertStatus.hasRed ? 'fill-red-500' : 'fill-slate-300';
            
            let chartsHTML = '';
            displayOrder.forEach(k => {
                let chartId = k === 'bp' ? 'bpChart' : `${k}Chart`;
                chartsHTML += `<div class="h-[160px]"><canvas id="${chartId}"></canvas></div>`;
            });

            return `
            <div id="detail-scroll-container" class="flex-1 p-4 space-y-4 overflow-y-auto h-[calc(100vh-53px)] animate-in slide-in-from-right-4">
                <div class="grid grid-cols-1 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <div class="space-y-4 col-span-1">
                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm relative overflow-hidden">
                            <div id="detail-color-bar" class="absolute top-0 left-0 w-full h-1.5 ${u.isDiscontinued ? 'bg-red-500' : 'bg-green-500'}"></div>
                            <div class="flex justify-between items-start mt-1">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-xl font-black text-slate-400">${u.kanaName.charAt(0)}</div>
                                    <div>
                                        <div class="text-[10px] text-slate-400 mb-0.5">${escapeHtml(u.kanaName)}</div>
                                        <h2 class="text-xl font-bold text-slate-900 leading-tight flex items-center gap-2">
                                            ${escapeHtml(u.name)}
                                            <button onclick="window.openAlertHistory('${u.uid}')" class="${bellBtnClass} transition-colors p-1.5 rounded-full shadow-sm" title="アラート履歴を表示">
                                                <i data-lucide="bell" class="w-4 h-4 ${bellIconClass}"></i>
                                            </button>
                                        </h2>
                                        <div class="text-[10px] text-slate-500 mt-1 flex items-center gap-1"><i data-lucide="building-2" class="w-3 h-3"></i> ${escapeHtml(u.officeName)}</div>
                                    </div>
                                </div>
                                <button onclick="window.openCSVModal('${u.uid}')" class="text-slate-400 hover:text-green-600 bg-slate-50 hover:bg-green-50 border border-slate-100 p-2 rounded-lg transition-all shadow-sm active:scale-95" title="この利用者のデータを出力">
                                    <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            ${orderedCardsHtml}
                        </div>

                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                            <h4 class="font-bold text-slate-800 text-sm flex items-center gap-2 mb-3"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i> ステータス編集</h4>
                            <div id="status-edit-container">
                                ${generateStatusEditHTML(u)}
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 xl:col-span-3 space-y-4">
                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                            <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                                <h3 class="font-black text-sm text-slate-800 flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4 text-indigo-500"></i> トレンド推移</h3>
                                <div class="flex flex-col sm:flex-row items-end sm:items-center gap-2">
                                    <div class="bg-slate-100 p-1 rounded-md flex gap-1">
                                        ${[['1w', '1週'], ['1m', '最新1月'], ['3m', '3ヶ月'], ['all', '全期間'], ['custom', '期間指定']].map(([v, l]) => `
                                            <button 
                                                onclick="window.setGraphPeriod('${v}')" 
                                                class="px-2 py-0.5 rounded text-[9px] font-black transition-all ${state.graphPeriod === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}"
                                            >${l}</button>
                                        `).join('')}
                                    </div>
                                    ${state.graphPeriod === 'custom' ? `
                                    <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-md border border-slate-100 animate-in fade-in slide-in-from-right-2">
                                        <input type="date" class="bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[9px] font-bold text-slate-600 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" value="${state.customStartDate}" onchange="window.setCustomDate('start', this.value)">
                                        <span class="text-[9px] text-slate-400 font-bold">〜</span>
                                        <input type="date" class="bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[9px] font-bold text-slate-600 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" value="${state.customEndDate}" onchange="window.setCustomDate('end', this.value)">
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${chartsHTML}
                            </div>

                        </div>
                        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                            <h3 class="font-black text-sm text-slate-800 mb-4 flex items-center gap-1.5"><i data-lucide="trending-up" class="w-4 h-4 text-red-500"></i> 異常変動アラート</h3>
                            <div class="h-[220px] bg-slate-50 rounded-xl p-2 border border-slate-100"><canvas id="trendChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderCharts() {
            const u = processedData.userStatsMap[state.selectedUserId]; if (!u) return;
            
            const chartIds = [
                'bpChart', 'pulseChart', 'spo2Chart', 'tempChart', 'bmiChart', 'weightChart', 
                'bloodSugarChart', 'respRateChart', 'sleepTimeChart', 'waterIntakeChart', 'walkTime5mChart',
                'turgorChart', 'anorexiaChart', 'medRecordChart', 'backPainChart', 'urinationPainChart', 'anginaChart', 
                'oralEnvChart', 'fallHistoryChart', 'trendChart'
            ];
            
            chartIds.forEach(id => {
                if (chartInstances[id]) chartInstances[id].destroy();
            });

            const filterByPeriod = (records) => {
                const validRecords = records.filter(r => 
                    isValidVital('sysBP', r.sysBP) || isValidVital('diaBP', r.diaBP) || isValidVital('pulse', r.pulse) || 
                    isValidVital('spo2', r.spo2) || isValidVital('temp', r.temp) || isValidVital('bmi', r.bmi) || 
                    isValidVital('weight', r.weight) || isValidVital('bloodSugar', r.bloodSugar) || isValidVital('respRate', r.respRate) || 
                    isValidVital('sleepTime', r.sleepTime) || isValidVital('waterIntake', r.waterIntake) || isValidVital('walkTime5m', r.walkTime5m) || 
                    isValidVital('turgor', r.turgor) || isValidVital('anorexia', r.anorexia) || isValidVital('medRecord', r.medRecord) || 
                    isValidVital('backPain', r.backPain) || isValidVital('urinationPain', r.urinationPain) || isValidVital('angina', r.angina) || isValidVital('oralEnv', r.oralEnv) || isValidVital('fallHistory', r.fallHistory)
                );

                if (validRecords.length === 0) return [];
                if (state.graphPeriod === 'all') return validRecords;
                
                if (state.graphPeriod === 'custom') {
                    if (!state.customStartDate && !state.customEndDate) return validRecords;
                    const start = state.customStartDate ? new Date(state.customStartDate).getTime() : 0;
                    const end = state.customEndDate ? new Date(state.customEndDate.replace(/-/g, '/') + ' 23:59:59').getTime() : Infinity; 
                    
                    return validRecords.filter(r => {
                        const t = new Date(r.date.replace(/-/g, '/')).getTime();
                        return t >= start && t <= end;
                    });
                }
                
                const latestDate = new Date(validRecords[validRecords.length - 1].date.replace(/-/g, '/'));
                let days = state.graphPeriod === '1w' ? 7 : state.graphPeriod === '1m' ? 30 : 90;
                
                const limit = new Date(latestDate);
                limit.setDate(limit.getDate() - days);
                
                return validRecords.filter(r => new Date(r.date.replace(/-/g, '/')) >= limit);
            };

            let filteredRecords = filterByPeriod(u.allRecords);
            let labels = [];

            if (filteredRecords.length === 0) {
                labels = [...Array(7)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (6 - i));
                    return formatDate(d).substring(5, 10);
                });
                filteredRecords = labels.map(() => ({})); 
            } else {
                labels = filteredRecords.map(r => r.date?.substring(5, 10) || '');
            }

            const common = { 
                responsive: true, 
                maintainAspectRatio: false, 
                interaction: { mode: 'index', intersect: false }, 
                plugins: { legend: { labels: { usePointStyle: true, font: { size: 9, weight: 'bold' } } } },
                elements: { line: { tension: 0 } },
                scales: {
                    x: { ticks: { font: { size: 8 } } },
                    y: { ticks: { font: { size: 8 } } }
                }
            };
            
            const createNumericChart = (ctxId, itemKey, title, colorCode, min, max) => {
                const ctx = document.getElementById(ctxId);
                if (ctx) {
                    const isTemp = itemKey === 'temp';
                    const isSleep = itemKey === 'sleepTime';
                    const mult = isSleep ? 1/60 : 1;

                    chartInstances[ctxId] = new Chart(ctx, { 
                        type: 'line', 
                        data: { 
                            labels: labels, 
                            datasets: [
                                { label: title, data: filteredRecords.map(r => { const v = getValidVital(itemKey, r[itemKey]); return v !== null ? v * mult : null; }), borderColor: colorCode, backgroundColor: colorCode, spanGaps: true, pointRadius: 2, order: 1 }, 
                                { label: `平均(${title})`, data: Array(filteredRecords.length).fill(u.overallAverages[itemKey] !== undefined ? u.overallAverages[itemKey] * mult : null), borderColor: '#94a3b8', backgroundColor: '#94a3b8', borderDash: [4, 4], pointRadius: 0, borderWidth: 1.5, order: 2 }
                            ] 
                        }, 
                        options: { 
                            ...common, 
                            scales: { x: common.scales.x, y: { ...common.scales.y, suggestedMin: min, suggestedMax: max } },
                            plugins: {
                                ...common.plugins,
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            if (isSleep) {
                                                const mins = context.parsed.y * 60;
                                                const h = Math.floor(mins / 60);
                                                const m = Math.round(mins % 60);
                                                const str = h > 0 ? (m > 0 ? `${h}時間${m}分` : `${h}時間`) : `${m}分`;
                                                if (context.datasetIndex === 1) return `平均: ${str}`;
                                                return `${title}: ${str}`;
                                            } else {
                                                if (context.datasetIndex === 1) return `平均: ${isTemp ? context.parsed.y.toFixed(1) : Math.floor(context.parsed.y)}`;
                                                return `${title}: ${context.parsed.y}`;
                                            }
                                        }
                                    }
                                }
                            }
                        } 
                    });
                }
            };

            const createCategoryChart = (ctxId, itemKey, title, colorCode) => {
                const ctx = document.getElementById(ctxId);
                if (ctx) {
                    chartInstances[ctxId] = new Chart(ctx, { 
                        type: 'line', 
                        data: { 
                            labels: labels, 
                            datasets: [
                                { label: title, data: filteredRecords.map(r => getValidVital(itemKey, r[itemKey])), borderColor: colorCode, backgroundColor: colorCode, spanGaps: true, pointRadius: 2, order: 1 }, 
                                { label: `平均(${title})`, data: Array(filteredRecords.length).fill(u.overallAverages[itemKey] || null), borderColor: '#94a3b8', backgroundColor: '#94a3b8', borderDash: [4, 4], pointRadius: 0, borderWidth: 1.5, order: 2 }
                            ] 
                        }, 
                        options: { 
                            ...common, 
                            scales: { 
                                x: common.scales.x,
                                y: { 
                                    ...common.scales.y,
                                    min: 0, max: 40, 
                                    ticks: { 
                                        ...common.scales.y.ticks,
                                        stepSize: 10, 
                                        callback: function(value) { 
                                            if(itemKey === 'medRecord') {
                                                return {10: '問題なし', 20: 'やや問題', 30: '問題あり'}[value] || '';
                                            }
                                            if(itemKey === 'oralEnv') {
                                                return {10: '問題なし', 20: '軽度(疑い)', 30: '重度(疑い)'}[value] || '';
                                            }
                                            return catLabels[itemKey][value] || ''; 
                                        }
                                    } 
                                } 
                            },
                            plugins: {
                                ...common.plugins,
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            if (context.datasetIndex === 1) return `平均: ${Math.floor(context.parsed.y)}`;
                                            const val = context.parsed.y;
                                            
                                            let displayLabel = catLabels[itemKey][val] || val;
                                            if (itemKey === 'medRecord') {
                                                const texts = {
                                                    10: '服薬数5種類以下・服薬コンプライアンス問題なし',
                                                    20: '服薬数5種類以上または服薬コンプライアンス問題あり',
                                                    30: '服薬数5種類以上・服薬コンプライアンス問題あり'
                                                }[val];
                                                if (texts) displayLabel = texts;
                                            }
                                            
                                            let labelText = `${title}: ${displayLabel}`;
                                            
                                            if (itemKey === 'fallHistory' && val === 20) {
                                                const r = filteredRecords[context.dataIndex];
                                                if (r && r.date) {
                                                    const pastFalls = u.allRecords.filter(rec => new Date(rec.date.replace(/-/g, '/')) <= new Date(r.date.replace(/-/g, '/')) && parseFloat(rec.fallHistory) === 20);
                                                    labelText += ` (計 ${pastFalls.length} 回)`;
                                                }
                                            }
                                            return labelText;
                                        }
                                    }
                                }
                            }
                        } 
                    });
                }
            };

            const bpCtx = document.getElementById('bpChart');
            if (bpCtx) {
                chartInstances['bpChart'] = new Chart(bpCtx, { 
                    type: 'line', 
                    data: { 
                        labels: labels, 
                        datasets: [
                            { label: '血圧(収)', data: filteredRecords.map(r => getValidVital('sysBP', r.sysBP)), borderColor: '#3b82f6', backgroundColor: '#3b82f6', spanGaps: true, pointRadius: 2, order: 1 }, 
                            { label: '平均(収)', data: Array(filteredRecords.length).fill(u.overallAverages.sysBP || null), borderColor: '#94a3b8', backgroundColor: '#94a3b8', borderDash: [4, 4], pointRadius: 0, borderWidth: 1.5, order: 2 },
                            { label: '血圧(拡)', data: filteredRecords.map(r => getValidVital('diaBP', r.diaBP)), borderColor: '#0ea5e9', backgroundColor: '#0ea5e9', spanGaps: true, pointRadius: 2, order: 3 }, 
                            { label: '平均(拡)', data: Array(filteredRecords.length).fill(u.overallAverages.diaBP || null), borderColor: '#94a3b8', backgroundColor: '#94a3b8', borderDash: [4, 4], pointRadius: 0, borderWidth: 1.5, order: 4 }
                        ] 
                    }, 
                    options: { 
                        ...common, 
                        scales: { x: common.scales.x, y: { ...common.scales.y, suggestedMin: 60, suggestedMax: 180 } },
                        plugins: {
                            ...common.plugins,
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        if (context.datasetIndex === 1 || context.datasetIndex === 3) return `平均: ${Math.floor(context.parsed.y)}`;
                                        return `${context.dataset.label}: ${context.parsed.y}`;
                                    }
                                }
                            }
                        }
                    } 
                });
            }

            createNumericChart('pulseChart', 'pulse', '脈拍', '#f59e0b', 50, 120);
            createNumericChart('spo2Chart', 'spo2', 'SpO2', '#ef4444', 90, 100);
            createNumericChart('tempChart', 'temp', '体温', '#10b981', 35.0, 38.0);
            createNumericChart('bmiChart', 'bmi', 'BMI', '#6366f1', 15, 30);
            createNumericChart('weightChart', 'weight', '体重', '#14b8a6', 30, 100);
            createNumericChart('bloodSugarChart', 'bloodSugar', '血糖値', '#f43f5e', 80, 200);
            createNumericChart('respRateChart', 'respRate', '呼吸数', '#06b6d4', 10, 30);
            createNumericChart('sleepTimeChart', 'sleepTime', '睡眠時間', '#8b5cf6', 0, 12);
            createNumericChart('waterIntakeChart', 'waterIntake', '水分量', '#3b82f6', 0, 3000);
            createNumericChart('walkTime5mChart', 'walkTime5m', '5m歩行時間', '#14b8a6', 0, 30);

            createCategoryChart('turgorChart', 'turgor', 'ツルゴール', '#8b5cf6');
            createCategoryChart('anorexiaChart', 'anorexia', '食欲不振', '#84cc16');
            createCategoryChart('medRecordChart', 'medRecord', '服薬記録', '#10b981');
            createCategoryChart('backPainChart', 'backPain', '背部痛', '#3b82f6');
            createCategoryChart('urinationPainChart', 'urinationPain', '排尿時痛', '#d946ef');
            createCategoryChart('anginaChart', 'angina', '狭心痛', '#f59e0b');
            createCategoryChart('oralEnvChart', 'oralEnv', '口腔環境', '#0ea5e9');
            createCategoryChart('fallHistoryChart', 'fallHistory', '転倒歴', '#ef4444');
            
            const tCtx = document.getElementById('trendChart');
            if (tCtx) {
                const trendDatasets = [
                    { label: '基準(±0)', data: Array(filteredRecords.length).fill(0), borderColor: '#94a3b8', borderDash: [5, 5], pointRadius: 0, order: 10 }
                ];

                const addTrendIfValid = (itemKey, label, color) => {
                    if (filteredRecords.some(r => r.deviations?.[itemKey] !== undefined && r.deviations?.[itemKey] !== null)) {
                        trendDatasets.push({ label: label, data: filteredRecords.map(r => r.deviations?.[itemKey] ?? null), borderColor: color, spanGaps: true, pointRadius: 2 });
                    }
                };

                addTrendIfValid('sysBP', '血圧(収)', '#3b82f6');
                addTrendIfValid('diaBP', '血圧(拡)', '#0ea5e9');
                addTrendIfValid('pulse', '脈拍', '#f59e0b');
                addTrendIfValid('spo2', 'SpO2', '#ef4444');
                addTrendIfValid('temp', '体温', '#10b981');
                addTrendIfValid('bmi', 'BMI', '#6366f1');
                addTrendIfValid('weight', '体重', '#14b8a6');
                addTrendIfValid('bloodSugar', '血糖値', '#f43f5e');
                addTrendIfValid('respRate', '呼吸数', '#06b6d4');
                addTrendIfValid('sleepTime', '睡眠時間', '#8b5cf6');
                addTrendIfValid('waterIntake', '水分量', '#3b82f6');
                addTrendIfValid('walkTime5m', '5m歩行', '#14b8a6');
                addTrendIfValid('turgor', 'ツルゴール', '#8b5cf6');
                addTrendIfValid('anorexia', '食欲不振', '#84cc16');
                addTrendIfValid('medRecord', '服薬記録', '#10b981');
                addTrendIfValid('backPain', '背部痛', '#3b82f6');
                addTrendIfValid('urinationPain', '排尿時痛', '#d946ef');
                addTrendIfValid('angina', '狭心痛', '#f59e0b');
                addTrendIfValid('oralEnv', '口腔環境', '#0ea5e9');
                addTrendIfValid('fallHistory', '転倒歴', '#ef4444');

                chartInstances['trendChart'] = new Chart(tCtx, { 
                    type: 'line', 
                    data: { 
                        labels: labels, 
                        datasets: trendDatasets
                    }, 
                    options: { ...common, scales: { x: common.scales.x, y: { ...common.scales.y, suggestedMin: -20, suggestedMax: 20 } } } 
                });
            }
        }

        initApp();
    </script>
</body>
</html>
